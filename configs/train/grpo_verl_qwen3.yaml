stage: grpo
backend: verl
dataset: NYC
model_profile: qwen3-8b-instruct
history_source: current
repr: sid
train_path: artifacts/NYC/grpo/sid/current/train.parquet
valid_path: artifacts/NYC/grpo/sid/current/valid.parquet
init_model_path: checkpoints/NYC/warmup/qwen3_8b_sid_current/merged_final
