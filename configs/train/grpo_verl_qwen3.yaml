n_gpus_per_node: 8
nnodes: 1
save_freq: 100
test_freq: 100
total_epochs: 3
trainer_use_legacy_worker_impl: enable
project_name: gnprsid-grpo
experiment_name: nyc-sid-current-qwen3
logger: '[console]'
lora:
  r: 16
  alpha: 32
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - gate_proj
  - up_proj
